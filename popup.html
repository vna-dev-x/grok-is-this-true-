<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grok Is This Real? Checker</title>
  <style>
    /* ─── Popup Styles ─────────────────────────────────────────────── */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 340px;
      min-height: 180px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #15202b;
      color: #e7e9ea;
      padding: 16px;
      line-height: 1.5;
    }

    h2 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    h2 .icon {
      font-size: 20px;
    }

    .subtitle {
      font-size: 12px;
      color: #8b98a5;
      margin-bottom: 16px;
    }

    /* Loading state */
    #loading {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #8b98a5;
      font-size: 13px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #38444d;
      border-top-color: #1d9bf0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Results */
    #results {
      display: none;
    }

    .result-card {
      background: rgba(29, 155, 240, 0.06);
      border: 1px solid #38444d;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .result-count {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .result-count .highlight {
      color: #1d9bf0;
    }

    .result-source {
      font-size: 11px;
      color: #71767b;
      margin-bottom: 8px;
    }

    .snippet-list {
      list-style: none;
      padding: 0;
    }

    .snippet-list li {
      background: rgba(255, 255, 255, 0.04);
      border-left: 3px solid #1d9bf0;
      padding: 6px 10px;
      margin-bottom: 6px;
      border-radius: 4px;
      font-size: 12px;
      color: #d6d9db;
      word-break: break-word;
      font-style: italic;
    }

    .no-results {
      color: #8b98a5;
      font-size: 13px;
      text-align: center;
      padding: 20px 0;
    }

    .no-results .emoji {
      font-size: 28px;
      display: block;
      margin-bottom: 8px;
    }

    .result-breakdown {
      font-size: 12px;
      color: #8b98a5;
      margin: 4px 0 6px;
    }

    .result-breakdown strong {
      color: #e7e9ea;
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .btn {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 9999px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.15s ease;
      text-align: center;
    }

    .btn-primary {
      background-color: #1d9bf0;
      color: #ffffff;
    }

    .btn-primary:hover {
      background-color: #1a8cd8;
    }

    .btn-secondary {
      background-color: transparent;
      color: #1d9bf0;
      border: 1px solid #1d9bf0;
    }

    .btn-secondary:hover {
      background-color: rgba(29, 155, 240, 0.1);
    }

    .timestamp {
      font-size: 10px;
      color: #536471;
      text-align: right;
      margin-top: 8px;
    }

    .grok-response-card {
      background: rgba(29, 155, 240, 0.06);
      border: 1px solid rgba(29, 155, 240, 0.2);
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 8px;
    }

    .grok-response-card .label {
      font-weight: 700;
      font-size: 13px;
      color: #1d9bf0;
      margin-bottom: 6px;
    }

    .grok-response-card .text {
      font-size: 12px;
      line-height: 1.6;
      color: #d6d9db;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .grok-response-card .count {
      font-size: 11px;
      color: #71767b;
      margin-top: 6px;
    }

    /* Footer */
    .footer {
      margin-top: 16px;
      padding-top: 10px;
      border-top: 1px solid #38444d;
      font-size: 11px;
      color: #536471;
      text-align: center;
    }
  </style>
</head>
<body>

  <h2>
    <span class="icon">🔍</span>
    Grok Is This Real?
  </h2>
  <p class="subtitle">Check if people are asking Grok to fact-check a tweet.</p>

  <!-- Loading state -->
  <div id="loading">
    <div class="spinner"></div>
    <span>Loading last scan results…</span>
  </div>

  <!-- Results container -->
  <div id="results"></div>

  <!-- Action buttons -->
  <div class="btn-row">
    <button class="btn btn-primary" id="scanBtn">Scan Current Page</button>
    <button class="btn btn-secondary" id="clearBtn">Clear</button>
  </div>

  <div class="footer">
    Grok Is This Real? Checker v1.0 &middot; Works on X / Twitter
  </div>

  <script src="popup.js"></script>

</body>
</html>
